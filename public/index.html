<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UrbanBuild — Beirut urban planning</title>
    <meta
      name="description"
      content="UrbanBuild: AI-assisted urban analysis for planners. Beirut pilot. OSM context, indicators, and structured insights — not official zoning."
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f4f5;
        --fg: #18181b;
        --card: #ffffff;
        --border: #e4e4e7;
        --accent: #1d4ed8;
        --muted: #71717a;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --fg: #fafafa;
          --card: #18181b;
          --border: #27272a;
          --accent: #60a5fa;
          --muted: #a1a1aa;
        }
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--fg);
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 650;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 1.25rem;
        line-height: 1.55;
        color: var(--muted);
        font-size: 0.95rem;
      }
      a.button {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.65rem 1.25rem;
        border-radius: 8px;
      }
      a.button:hover {
        filter: brightness(1.05);
      }
      .fine {
        margin-top: 1.25rem;
        font-size: 0.75rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>UrbanBuild</h1>
      <p>
        AI-assisted urban planning and design analysis for the <strong>Beirut</strong> pilot: OpenStreetMap
        context, heuristic indicators, and structured insights with confidence labels — not municipal zoning.
      </p>
      <p><a class="button" href="/">Open the app</a></p>
      <p class="fine">Main product: Next.js app at <code>/</code>. This page is a static entry at <code>/index.html</code>.</p>
    </main>
  </body>
</html>
